schemaVersion: att-tool-group/v2.2
id: fpp
name: FPP reference tools
description: Reference command contracts for FPP API, SQLPlus, controlled command execution, file, and transaction-log integrations
tools:
  invokeApi:
    name: Invoke FPP API
    description: Reference API invocation skeleton returning an XML result envelope
    command: [./tools/fpp_invoke_api.sh, "${requestId}", "${requestType}", "${requestFile}", "${apiLogPath}"]
    output: xml
    arguments:
      requestId:
        name: Request ID
        description: Unique request correlation ID
        required: true
      requestType:
        name: Request Type
        description: FPP request or message type
        required: true
      requestFile:
        name: Request File
        description: Absolute path of the request payload file
        required: true
      apiLogPath:
        name: API Log Path
        description: Full path of the API integration log file
        required: true
  sqlplusToXml:
    name: Convert SQLPlus output to XML
    description: Convert pipe-delimited SQLPlus rows into XML using safe column names as element names
    command: [./tools/fpp_sqlplus_to_xml.sh, "${inputFile}"]
    output: xml
    arguments:
      inputFile:
        name: SQLPlus Output File
        description: SQLPlus output using SET COLSEP '|' with one header row and zero or more data rows
        required: true
  execCommand:
    name: Execute command and capture streams
    description: Execute one command with optional pipe-delimited atomic arguments, optionally persist streams, and return a YAML outcome
    command: [./tools/exehelper.sh, "${stdoutPath}", "${stderrPath}", --, "${command}", "${arguments}"]
    output: yaml
    arguments:
      command:
        name: Command
        description: Executable name resolved from PATH or executable path, without arguments
        required: true
      stdoutPath:
        name: Stdout Path
        description: Optional target path for standard output; when omitted, output is written to the current Case log
        required: false
        argName: --stdout
      stderrPath:
        name: Stderr Path
        description: Optional target path for standard error; when omitted, output is written to the current Case log
        required: false
        argName: --stderr
      arguments:
        name: Arguments
        description: Optional pipe-delimited command arguments; use an empty value for no arguments
        required: false
        delimit: "|"
  moveFiles:
    name: Move matching files
    description: Move regular files matching one filename glob between directories after collision preflight
    command: [./tools/fpp_move_files.sh, "${sourceDirectory}", "${pattern}", "${targetDirectory}", "${overwrite}"]
    output: yaml
    arguments:
      sourceDirectory:
        name: Source Directory
        description: Directory containing the prepared input files
        required: true
      pattern:
        name: Filename Pattern
        description: Filename glob evaluated only within the source directory
        required: true
      targetDirectory:
        name: Target Directory
        description: Destination directory
        required: true
      overwrite:
        name: Overwrite
        description: true to replace existing target files; false to reject every collision
        required: true
  inspectFiles:
    name: Inspect matching files
    description: Return matching regular files, count, line counts, and an optional all-files line-count comparison
    command: [./tools/fpp_inspect_files.sh, "${directory}", "${pattern}", "${expectedLineCount}"]
    output: yaml
    arguments:
      directory:
        name: Directory
        description: Directory to inspect without recursion
        required: true
      pattern:
        name: Filename Pattern
        description: Filename glob evaluated only within the directory
        required: true
      expectedLineCount:
        name: Expected Line Count
        description: Optional non-negative line count which every matched file must have
        required: false
  searchText:
    name: Search fixed text
    description: Count lines containing one literal keyword in a regular text file
    command: [./tools/fpp_search_text.sh, "${file}", "${keyword}"]
    output: yaml
    arguments:
      file:
        name: File
        description: Text file to search
        required: true
      keyword:
        name: Keyword
        description: Non-blank literal text; no regular-expression evaluation
        required: true
  loghelper:
    name: Search transaction logs
    description: Search recent local transaction logs for TIDs containing every keyword, with optional SSH fallback
    command: [./tools/loghelper.sh, "${maxTidFiles}", "${outputPrefix}", "${logFiles}", "${keywords}", "${recentLogCount}", "${sshOption}"]
    output: yaml
    arguments:
      maxTidFiles:
        name: Maximum TID Files
        description: Positive maximum number of matching TID log files to return
        required: true
        argName: --max-tid-files
      outputPrefix:
        name: Output Prefix
        description: Result path prefix; a bare prefix writes results under /tmp
        required: true
        argName: --output-prefix
      logFiles:
        name: Log Files
        description: Pipe-delimited unordered local and remote log file paths
        required: true
        delimit: "|"
        argName: --log-file
      keywords:
        name: Keywords
        description: Pipe-delimited literal keywords which must all occur under the same TID
        required: true
        delimit: "|"
        argName: --keyword
      recentLogCount:
        name: Recent Log Count
        description: Optional number of newest logs to search; defaults to 2 and 0 searches all logs
        required: false
        argName: --recent-log-count
      sshOption:
        name: SSH Option
        description: Optional literal --ssh to enable configured remote fallback after a local miss
        required: false
  querySqlplus:
    name: Query SQLPlus and return XML
    description: Execute one SQL file through SQLPlus, save raw streams, and convert pipe-delimited stdout to XML
    command: [./tools/fpp_query_sqlplus.sh, "${sqlFile}", "${outputFile}", "${stderrPath}"]
    output: xml
    arguments:
      sqlFile:
        name: SQL File
        description: SQLPlus script which exits non-zero while its expected condition is not yet satisfied
        required: true
      outputFile:
        name: SQLPlus Output File
        description: Full path for raw pipe-delimited SQLPlus stdout
        required: true
      stderrPath:
        name: SQLPlus Stderr Path
        description: Full path for SQLPlus diagnostics
        required: true
