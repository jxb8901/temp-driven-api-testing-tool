schemaVersion: att-config/v2.2
outputDirectory: output
environment: SIT
timeoutMs: 10000
caseLog:
  yamlAnchors: false
testcase:
  root: testcase

run:
  id:
    default: timestamp
    timestampFormat: yyyyMMdd-HHmmss

templates:
  root: templates

toolGroups:
  - config/tools/sample.yaml

report:
  mode: append-to-copy
  fileNamePattern: "${suiteName}.result.xlsx"
  columns:
    result: Test Result
    durationMs: Duration(ms)
    actualResult: Actual Result
    caseLog: Case Log
    runTime: Run Time

tools:
  invokePaymentApi:
    name: Invoke Payment API
    description: Invoke the payment API with a rendered request file
    command: [./tools/invoke_payment_api.sh, "${requestFile}", "${environment}"]
    output: xml
    arguments:
      requestFile:
        name: Request File
        description: Rendered payment request XML file
        required: true
      environment:
        name: Environment
        description: Target execution environment
        required: true
  selectCtxn:
    name: Select CT records
    description: Query transaction records
    command: [./tools/select_ct_txn.sh, "${caseId}", "${txnRef}"]
    output: yaml
    arguments:
      caseId:
        name: Case ID
        description: Full V2 Case ID
        required: true
      txnRef:
        name: Transaction Reference
        description: Optional transaction reference
        required: false
  grepFromAppLogs:
    name: Grep application logs
    description: Find one or more keywords in application logs
    command: [./tools/grep_from_app_logs.sh, "${logText}", "${keywords}"]
    output: yaml
    arguments:
      logText:
        name: Log Text
        description: Application log text to search
        required: true
      keywords:
        name: Keywords
        description: Comma-delimited keywords expanded as the final argument array
        required: true
        delimit: ","
  getAppLogs:
    name: Get application logs
    description: Collect application logs for a case
    command: [./tools/get_app_logs.sh, "${caseId}"]
    output: txt
    arguments:
      caseId:
        name: Case ID
        description: Full V2 Case ID
        required: true
  genEndToEndId:
    name: Generate end-to-end ID
    description: Generate a unique end-to-end identifier
    command: [./tools/gen_e2e_id.sh, "${caseId}"]
    output: txt
    arguments:
      caseId:
        name: Case ID
        description: Full V2 Case ID
        required: true
  getAcDate:
    name: Get account date
    description: Return the current account date
    command: [./tools/get_ac_date.sh]
    output: txt
    arguments: {}
  getSeq:
    name: Get sequence
    description: Generate a new sequence value
    command: [./tools/get_seq.sh, "${caseId}"]
    output: txt
    arguments:
      caseId:
        name: Case ID
        description: Full V2 Case ID
        required: true
