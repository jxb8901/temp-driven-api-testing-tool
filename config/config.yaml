outputDirectory: output
environment: SIT
timeoutSeconds: 120

run:
  id:
    default: timestamp
    timestampFormat: yyyyMMdd-HHmmss

testcase:
  sheet: TestCases
  columns:
    caseId: Case ID
    caseName: Case Name
    tags: Tags
    api: API
    stagePre: Pre Stage Template
    stageMain: Main Stage Template
    stagePost: Post Stage Template
    debitAccount: Debit Account
    creditAccount: Credit Account
    amount: Amount
    currency: Currency
    data: Case Data
    remarks: Remarks

stages:
  - key: stagePre
    name: Pre
    required: false
    onFailure: stop
  - key: stageMain
    name: Main
    required: true
    onFailure: stop
  - key: stagePost
    name: Post
    required: false
    onFailure: stop

templates:
  root: templates/stage

report:
  mode: append-to-copy
  fileNamePattern: "${suiteName}.result.xlsx"
  columns:
    result: Test Result
    durationMs: Duration(ms)
    actualResult: Actual Result
    caseLog: Case Log
    runTime: Run Time

tools:
  invokeOutwardService:
    name: Invoke Outward Service
    command: "./tools/invoke_outward_service.sh --input ${TOOL.inputFile} --output ${TOOL.outputFile}"
    output: xml
    arguments:
      requestXml: "${TOOL.input.requestXml}"
      environment: "${environment}"
  invokeInwardService:
    name: Invoke Inward Service
    command: "./tools/invoke_inward_service.sh --input ${TOOL.inputFile} --output ${TOOL.outputFile}"
    output: xml
    arguments:
      requestXml: "${TOOL.input.requestXml}"
      environment: "${environment}"
  invokePaymentApi:
    name: Invoke Payment API
    command: "./tools/invoke_payment_api.sh --input ${TOOL.inputFile} --output ${TOOL.outputFile}"
    output: xml
    arguments:
      requestXml: "${TOOL.input.requestXml}"
      environment: "${environment}"
  getAPIResponse:
    name: Get API Response
    command: "./tools/cat_api_response.sh --input ${TOOL.inputFile} --output ${TOOL.outputFile}"
    output: xml
    arguments:
      responseXml: "${TOOL.input.responseXml}"
  selectCtxn:
    name: Select CT records
    command: "./tools/select_ct_txn.sh --input ${TOOL.inputFile} --output ${TOOL.outputFile}"
    output: yaml
    arguments:
      caseId: "${CaseID}"
      txnRef: "${TOOL.input.txn.ref}"
  grepFromAppLogs:
    name: Grep keywords from application logs
    command: "./tools/grep_from_app_logs.sh --input ${TOOL.inputFile} --output ${TOOL.outputFile}"
    output: yaml
    arguments:
      keyword1: "${TOOL.input.keyword1}"
      keyword2: "${TOOL.input.keyword2}"
  getAppLogs:
    name: Get application logs
    command: "./tools/get_app_logs.sh --input ${TOOL.inputFile} --output ${TOOL.outputFile}"
    output: txt
    arguments:
      caseId: "${CaseID}"
  genEndToEndId:
    name: Generate a unique end-to-end ID
    command: "./tools/gen_e2e_id.sh --input ${TOOL.inputFile} --output ${TOOL.outputFile}"
    output: txt
    arguments:
      caseId: "${CaseID}"
  getAcDate:
    name: Get account date
    command: "./tools/get_ac_date.sh --input ${TOOL.inputFile} --output ${TOOL.outputFile}"
    output: txt
  getSeq:
    name: Get a new sequence
    command: "./tools/get_seq.sh --input ${TOOL.inputFile} --output ${TOOL.outputFile}"
    output: txt
    arguments:
      caseId: "${CaseID}"
