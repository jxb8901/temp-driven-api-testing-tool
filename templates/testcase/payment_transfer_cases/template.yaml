name: Payment Transfer Cases
description: Default suite model for payment transfer regression workbooks.

testcase:
  sheet: TestCases
  columns:
    caseId: Case ID
    caseName: Case Name
    tags: Tags
    api: API
    debitAccount: Debit Account
    creditAccount: Credit Account
    amount: Amount
    currency: Currency
    data: Case Data
    remarks: Remarks

stages:
  - key: prepare
    name: Prepare
    template: PAYMENT_PREPARE
    required: false
    onFailure: stop
  - key: invoke
    name: Invoke
    template: PAYMENT_INVOKE
    required: true
    onFailure: stop
  - key: verify
    name: Verify
    template: PAYMENT_VERIFY
    required: true
    onFailure: stop

actionDefaults:
  onFailure: stop
  logOutput: summary

report:
  columns:
    result: Test Result
    durationMs: Duration(ms)
    actualResult: Actual Result
    caseLog: Case Log
    runTime: Run Time
