schemaVersion: att-template/v2.3
name: PAYMENT_PREPARE
description: Prepare payment request identifiers.

actions:
  getAcDate:
    type: tool
    call: "#{getAcDate()}"

  getSeq:
    type: tool
    call: "#{getSeq(caseId=${CASE.caseId})}"

  genEndToEndId:
    type: tool
    call: "#{genEndToEndId(caseId=${CASE.caseId})}"

  logIds:
    type: log
    level: INFO
    message: "Prepared IDs for ${CASE.caseId}"
    fields:
      acDate: "${ACTIONS.getAcDate.output.result}"
      sequence: "${ACTIONS.getSeq.output.result}"
      endToEndId: "${ACTIONS.genEndToEndId.output.result}"
