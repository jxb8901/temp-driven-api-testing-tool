schemaVersion: att-template/v2.1
name: PAYMENT_VERIFY
description: Verify payment API response, CT records and application logs.

actions:
  checkAPIResult:
    type: assert
    expression: "${CASE.STAGES.invoke.TEMPLATE.ACTIONS.callApi.output.children.Status.text} == '${CASE.預期結果.status}'"

  checkRejectCode:
    type: assert
    expression: "${CASE.STAGES.invoke.TEMPLATE.ACTIONS.callApi.output.children.RejectCode.text} == '${CASE.預期結果.rejectCode}'"

  selectTxn:
    type: tool
    call: "#{selectCtxn(caseId=${CASE.caseId})}"

  checkCtxRecords:
    type: assert
    expression: "${ACTIONS.selectTxn.output.effectRows} >= '${CASE.預期結果.effectRows}' and ${ACTIONS.selectTxn.output.record.status} like '%${CASE.預期結果.txnStatus}%'"

  getLogs:
    type: tool
    call: "#{getAppLogs(caseId=${CASE.caseId})}"

  grepLogs:
    type: tool
    call: "#{grepFromAppLogs(logFile=${ACTIONS.getLogs.outputFile}, keywords=${CASE.預期結果.keywords})}"
    onFailure: continue

  checkLogs:
    type: assert
    expression: "${ACTIONS.getLogs.output} like '%PAYMENT%POSTED%'"

  logSummary:
    type: log
    level: INFO
    message: "Verified payment result for ${CASE.caseId}"
    fields:
      apiStatus: "${CASE.STAGES.invoke.TEMPLATE.ACTIONS.callApi.output.children.Status.text}"
      txnStatus: "${ACTIONS.selectTxn.output.record.status}"
