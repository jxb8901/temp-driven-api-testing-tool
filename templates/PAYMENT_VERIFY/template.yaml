schemaVersion: att-template/v2.3
name: PAYMENT_VERIFY
description: Verify payment API response, CT records and application logs.

actions:
  checkAPIResult:
    type: assert
    description: API status matches the expected status
    assert: "${CASE.STAGES.invoke.TEMPLATE.ACTIONS.callApi.output.result.Status} == '${CASE.預期結果.status}'"
    expected: "${CASE.預期結果.status}"
    actual: "${CASE.STAGES.invoke.TEMPLATE.ACTIONS.callApi.output.result.Status}"

  checkRejectCode:
    type: assert
    description: API reject code matches the expected code
    assert: "${CASE.STAGES.invoke.TEMPLATE.ACTIONS.callApi.output.result.RejectCode} == '${CASE.預期結果.rejectCode}'"
    expected: "${CASE.預期結果.rejectCode}"
    actual: "${CASE.STAGES.invoke.TEMPLATE.ACTIONS.callApi.output.result.RejectCode}"

  selectTxn:
    type: tool
    call: "#{selectCtxn(caseId=${CASE.caseId})}"

  checkCtxRecords:
    type: assert
    description: CT record count and status match the expectation
    assert: "${ACTIONS.selectTxn.output.result.effectRows} >= '${CASE.預期結果.effectRows}' and ${ACTIONS.selectTxn.output.result.record.status} like '%${CASE.預期結果.txnStatus}%'"
    expected: "effectRows>=${CASE.預期結果.effectRows}, status=${CASE.預期結果.txnStatus}"
    actual: "effectRows=${ACTIONS.selectTxn.output.result.effectRows}, status=${ACTIONS.selectTxn.output.result.record.status}"

  getLogs:
    type: tool
    call: "#{getAppLogs(caseId=${CASE.caseId})}"

  grepLogs:
    type: tool
    call: "#{grepFromAppLogs(logText=${ACTIONS.getLogs.output.result}, keywords=${CASE.預期結果.keywords})}"
    onFailure: continue

  checkLogs:
    type: assert
    description: Application logs contain the expected payment marker
    assert: "${ACTIONS.getLogs.output.result} like '%PAYMENT%POSTED%'"
    expected: PAYMENT...POSTED
    actual: "${ACTIONS.getLogs.output.result}"

  logSummary:
    type: log
    level: INFO
    message: "Verified payment result for ${CASE.caseId}"
    fields:
      apiStatus: "${CASE.STAGES.invoke.TEMPLATE.ACTIONS.callApi.output.result.Status}"
      txnStatus: "${ACTIONS.selectTxn.output.result.record.status}"
