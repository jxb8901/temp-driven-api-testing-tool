schemaVersion: att-template/v2.1
name: PAYMENT_INVOKE
description: Render payment request XML to a file and invoke the payment API.

actions:
  renderRequest:
    type: render
    payload: payload.xml
    saveAs: request.xml

  logRequest:
    type: log
    level: INFO
    message: "Rendered request for ${CASE.caseId}"
    fields:
      requestFile: "${ACTIONS.renderRequest.outputFile}"
      requestSha256: "${ACTIONS.renderRequest.outputSha256}"

  callApi:
    type: tool
    call: "#{invokePaymentApi(requestFile=${ACTIONS.renderRequest.outputFile}, environment=${CASE.environment})}"
