schemaVersion: att-template/v2.3
name: PAYMENT_INVOKE
description: Render payment request XML to a file and invoke the payment API.

actions:
  renderRequest:
    type: render
    payload: payload.xml
    renderAs: file

  logRequest:
    type: log
    level: INFO
    message: "Rendered request for ${CASE.caseId}"
    fields:
      requestFile: "${ACTIONS.renderRequest.output.targetFiles[0]}"

  callApi:
    type: tool
    call: "#{invokePaymentApi(requestFile=${ACTIONS.renderRequest.output.targetFiles[0]}, environment=${CASE.environment})}"
