schemaVersion: att-sidecar/v2.1
id: payment2
excel:
  sheet: CT
  headerRows: 2
  caseId: 案例編號
  tags: 標籤
  dataColumns: caseName=案例名稱, debitAccount=扣賬帳號, creditAccount=入賬帳號, amount=金額, currency=幣別, 預期結果(yaml)

stages:
  - key: invoke
    template: 執行模板
    required: true
    onFailure: stop
    runWhen: normal

report:
  columns:
    result: 測試結果
    durationMs: 耗時毫秒
    expectedResult: 預期結果
    actualResult: 實際結果
    runTime: 執行時間
